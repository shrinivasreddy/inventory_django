{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset email sent | Blue Dome Inventory</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
      background: #0f172a; color: #e5e7eb; font-family: "Segoe UI", Arial, sans-serif; }
    .card { width: 100%; max-width: 480px; padding: 32px; border: 1px solid #334155; border-radius: 14px; background: #1e293b; }
    h1, a { color: #4ade80; } p { color: #cbd5e1; line-height: 1.6; }
    @media (max-width: 480px) {
      body { padding: 12px; align-items: start; }
      .card { padding: 24px 18px; border-radius: 10px; }
      h1 { font-size: 24px; }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Khula:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'inventory/css/auth.css' %}">
</head>
<body><main class="card">

    {% include "registration/_brand.html" %}
    <h1>Check your email</h1>
  <p>If an active account matches that email address, a reset link has been sent. Check your spam folder if it doesn’t arrive shortly.</p>
  <p><a href="{% url 'login' %}">Return to login</a></p>
</main></body>
</html>
