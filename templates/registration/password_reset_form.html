<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password | Inventory Web</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px;
      background: #0f172a; color: #e5e7eb; font-family: "Segoe UI", Arial, sans-serif; }
    .card { width: 100%; max-width: 440px; padding: 32px; border: 1px solid #334155;
      border-radius: 14px; background: #1e293b; box-shadow: 0 20px 50px #02061766; }
    h1 { margin: 0 0 10px; color: #4ade80; font-size: 27px; }
    p { color: #94a3b8; line-height: 1.5; }
    label { display: block; margin: 20px 0 6px; color: #cbd5e1; font-size: 13px; font-weight: 700; }
    input { width: 100%; padding: 12px; border: 1px solid #475569; border-radius: 7px;
      background: #0f172a; color: #fff; font-size: 15px; }
    input:focus { outline: 2px solid #4ade80; border-color: transparent; }
    button { width: 100%; margin-top: 22px; padding: 12px; border: 0; border-radius: 7px;
      background: #4ade80; color: #052e16; font-weight: 800; cursor: pointer; }
    .errorlist { color: #fca5a5; font-size: 13px; }
    .footer { margin-top: 20px; text-align: center; font-size: 14px; }
    a { color: #4ade80; }
    @media (max-width: 480px) {
      body { padding: 12px; align-items: start; }
      .card { padding: 24px 18px; border-radius: 10px; }
      h1 { font-size: 24px; }
      input { min-height: 44px; font-size: 16px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Reset your password</h1>
    <p>Enter the email address connected to your account. We’ll send you a secure, single-use reset link.</p>
    <form method="post">
      {% csrf_token %}
      <label for="{{ form.email.id_for_label }}">Email address</label>
      {{ form.email }}
      {{ form.email.errors }}
      <button type="submit">Send reset link</button>
    </form>
    <p class="footer"><a href="{% url 'login' %}">Back to login</a></p>
  </main>
</body>
</html>
